<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;600&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fff0f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka Plan Yağan Objeler İçin Konteyner */
        #fallingContainer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.6);
            max-width: 500px;
            width: 85%;
            z-index: 10;
            position: relative;
            border: 2px solid #ffb3c6;
            transition: all 1s ease-in-out;
        }

        /* Titreme Efekti */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.8rem;
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        p.question {
            font-weight: 600;
            color: #ad1457;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        input {
            padding: 12px;
            border: 2px solid #f48fb1;
            border-radius: 12px;
            width: 80%;
            margin-bottom: 15px;
            outline: none;
            font-size: 1.1rem;
            text-align: center;
            background-color: #fffafb;
            color: #880e4f;
        }

        button {
            background-color: #f06292;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
        }

        button:hover {
            background-color: #ec407a;
            transform: translateY(-2px);
        }

        #secretContent {
            display: none;
            opacity: 0;
        }

        /* Nefes Alan Fotoğraf Efekti */
        .breathing-img {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid #fff0f5;
            opacity: 0;
            transition: opacity 2s ease-in;
            animation: breath 4s ease-in-out infinite;
        }

        @keyframes breath {
            0% { transform: scale(0.98); box-shadow: 0 5px 15px rgba(216, 27, 96, 0.2); }
            50% { transform: scale(1.02); box-shadow: 0 15px 25px rgba(216, 27, 96, 0.5); }
            100% { transform: scale(0.98); box-shadow: 0 5px 15px rgba(216, 27, 96, 0.2); }
        }

        .message {
            color: #4a148c;
            line-height: 1.7;
            margin-top: 20px;
            text-align: justify;
            font-size: 1.05rem;
            min-height: 200px; /* Daktilo yazarken sayfa zıplamasın diye */
        }

        .message p {
            margin-bottom: 15px;
        }

        .signature {
            text-align: center !important;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #d81b60;
            margin-top: 25px;
            font-weight: bold;
        }
        
        /* Daktilo imleci */
        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="fallingContainer"></div>

<div class="container" id="loginBox">
    <h2 style="opacity: 1;">Kilitli Anı Kutusu</h2>
    <p class="question">Doğum günlerimiz arasındaki gün sayısı?</p>
    <input type="number" id="passwordInput" placeholder="Cevap...">
    <br>
    <button onclick="checkPassword()">Kilidi Aç</button>
</div>

<div class="container" id="secretContent">
    <h2 id="titleText">Senin İçin...</h2>
    <img src="image.png" alt="Biz" class="breathing-img" id="coupleImg">
    <div class="message" id="messageBox"></div>
</div>

<script>
    const lines = [
        "Tekrar ettiğim şeyler yüzünden seni üzdüm, kendime çok kızgınım. Sadece özür dilemek yangına şırıngayla müdahale etmek gibi olur.",
        "Tabii ki bunların arkasına sığınarak yaptıklarımı normalleştirmeyeceğim ama bildiğin gibi kötü zamanlardan geçtim. O sırada kendi iç çatışmalarım yüzünden dikkatimi yapmam gereken şeylere veremedim, kendi salaklığım ve aptallığımdı. Şu an tamamen farkındayım; çok profesyonel olmasa da destek alıyorum, gerekirse daha profesyonel bir destek de alabilirim. Seni üzmemek için elimden gelen ne varsa yaparım.",
        "Yaptıklarım sana kendini dinlenmiyormuş, umursanmıyormuş gibi hissettirmiş olabilir, biliyorum. Kırdığım güveni de yeniden kurmak için acele etmem, sabırla eskisinden daha güçlüsünü beraber inşa edebiliriz."
    ];
    const signature = "Seni her şey ve herkesten çok seviyorum. ❤️";

    function checkPassword() {
        const password = document.getElementById('passwordInput').value.trim();
        if (password === "100") {
            triggerMagic();
        } else {
            alert("Sanki bu o sayı değildi... Tekrar düşünmek ister misin? 🌸");
        }
    }

    function triggerMagic() {
        const loginBox = document.getElementById('loginBox');
        
        // 1. Kutuyu Titret
        loginBox.classList.add('shake');
        
        setTimeout(() => {
            // 2. Kutuyu Patlat (Görünmez yap ve patlama animasyonu çağır)
            loginBox.style.display = 'none';
            explodeParticles();
            
            // 3. Arka planda yağan çiçekleri başlat
            startFallingBackground();

            // 4. Yeni ekranı yumuşakça getir
            const secretContent = document.getElementById('secretContent');
            secretContent.style.display = 'block';
            
            setTimeout(() => {
                secretContent.style.opacity = '1';
                document.getElementById('titleText').style.opacity = '1';
                document.getElementById('coupleImg').style.opacity = '1';
                
                // 5. Birkaç saniye sonra daktilo efektini başlat
                setTimeout(startTypewriter, 1500);
            }, 100);

        }, 500); // Titreme süresi kadar bekle
    }

    function explodeParticles() {
        const emojis = ['❤️', '💖', '🌸', '💮', '🪷'];
        for (let i = 0; i < 40; i++) {
            let p = document.createElement('div');
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.position = 'fixed';
            p.style.left = '50%';
            p.style.top = '50%';
            p.style.fontSize = (Math.random() * 20 + 20) + 'px';
            p.style.pointerEvents = 'none';
            p.style.zIndex = '999';
            p.style.transition = 'all 1s cubic-bezier(0.25, 1, 0.5, 1)';
            p.style.transform = 'translate(-50%, -50%) scale(0.1)';
            document.body.appendChild(p);

            setTimeout(() => {
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * 350 + 100; // Ne kadar uzağa patlayacakları
                let tx = Math.cos(angle) * radius;
                let ty = Math.sin(angle) * radius;
                p.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1.5) rotate(${Math.random()*360}deg)`;
                p.style.opacity = '0';
            }, 50);

            setTimeout(() => p.remove(), 1050);
        }
    }

    function startFallingBackground() {
        const container = document.getElementById('fallingContainer');
        const emojis = ['🌸', '💮', '🪷', '💖'];
        
        setInterval(() => {
            let p = document.createElement('div');
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.position = 'absolute';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-50px';
            p.style.fontSize = (Math.random() * 15 + 15) + 'px';
            p.style.opacity = Math.random() * 0.5 + 0.3;
            p.style.transition = 'all ' + (Math.random() * 3 + 4) + 's linear';
            container.appendChild(p);

            setTimeout(() => {
                p.style.top = '110vh';
                p.style.transform = `rotate(${Math.random()*360}deg)`;
            }, 50);

            setTimeout(() => p.remove(), 7000);
        }, 400); // Ekrana düşme sıklığı
    }

    let lineIdx = 0;
    let charIdx = 0;
    let msgBox = document.getElementById('messageBox');
    let currentP = null;

    function startTypewriter() {
        if (lineIdx < lines.length) {
            if (charIdx === 0) {
                if(currentP) currentP.classList.remove('cursor');
                currentP = document.createElement('p');
                currentP.classList.add('cursor');
                msgBox.appendChild(currentP);
            }
            if (charIdx < lines[lineIdx].length) {
                currentP.innerHTML += lines[lineIdx].charAt(charIdx);
                charIdx++;
                setTimeout(startTypewriter, 30); // Yazı hızı (milisaniye)
            } else {
                lineIdx++;
                charIdx = 0;
                setTimeout(startTypewriter, 600); // Paragraf arası bekleme
            }
        } else {
            if(currentP) currentP.classList.remove('cursor');
            let sig = document.createElement('p');
            sig.className = 'signature';
            sig.innerHTML = signature;
            sig.style.opacity = 0;
            sig.style.transition = "opacity 2s";
            msgBox.appendChild(sig);
            setTimeout(() => sig.style.opacity = 1, 100);
        }
    }
</script>

</body>
</html>
